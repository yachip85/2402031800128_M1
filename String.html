<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Object</title>
</head>

<body>

<script>

// charAt()
var str = "JavaScript";
document.write("charAt : " + str.charAt(4));
document.write("<br><br>");


// concat()
var fname = "Yachi";
var lname = " Patel";

document.write("concat : " + fname.concat(lname));
document.write("<br><br>");


// indexOf()
var str = "I Love JavaScript";

document.write("indexOf : " + str.indexOf("JavaScript"));
document.write("<br><br>");


// lastIndexOf()
var str = "JavaScript is easy and JavaScript is powerful";

document.write("lastIndexOf : " + str.lastIndexOf("JavaScript"));
document.write("<br><br>");


// search()
var str = "Welcome to JavaScript";

document.write("search : " + str.search("JavaScript"));
document.write("<br><br>");


// match()
var str = "JavaScript Tutorial";

document.write("match : " + str.match("Tutorial"));
document.write("<br><br>");


// replace()
var str = "I like Java";

document.write("replace : " + str.replace("Java", "JavaScript"));
document.write("<br><br>");


// substr()
var str = "JavaScript";

document.write("substr : " + str.substr(0,4));
document.write("<br><br>");


// substring()
var str = "JavaScript";

document.write("substring : " + str.substring(4,10));
document.write("<br><br>");


// slice()
var str = "JavaScript";

document.write("slice : " + str.slice(0,4));
document.write("<br><br>");


// toLowerCase()
var str = "HELLO";

document.write("toLowerCase : " + str.toLowerCase());
document.write("<br><br>");


// toLocaleLowerCase()
var str = "WELCOME";

document.write("toLocaleLowerCase : " + str.toLocaleLowerCase());
document.write("<br><br>");


// toUpperCase()
var str = "hello";

document.write("toUpperCase : " + str.toUpperCase());
document.write("<br><br>");


// toLocaleUpperCase()
var str = "javascript";

document.write("toLocaleUpperCase : " + str.toLocaleUpperCase());
document.write("<br><br>");


// toString()
var num = 500;

document.write("toString : " + num.toString());
document.write("<br><br>");


// valueOf()
var str = new String("JavaScript");

document.write("valueOf : " + str.valueOf());
document.write("<br><br>");


// split()
var str = "HTML,CSS,JavaScript";

document.write("split : " + str.split(","));
document.write("<br><br>");


// trim()
var str = "   Hello User   ";

document.write("trim : " + str.trim());

</script>

</body>
</html>
