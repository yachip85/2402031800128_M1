<!--table tags-->

<form name="RegForm" method="post" id="RegForm" onsubmit="return
validate()" >

<tr>

center;">REGISTRATION FORM</h1></td>

value="Reset" name="Reset" /> <br></td>

</tr>
</table>
</form>

<script>

function validate()
{
    var form1 = document.getElementById("RegForm");

    var name = form1.Name.value;

    var email = form1.EMail.value;

    var phone = form1.Telephone.value;

    var what = form1.Subject;

    var password = form1.Password.value;

    // Email Regex
    var regEmail = /^[\w-\.]+@[\w]+\.[\w]+$/;

    // Phone Regex
    var regPhone = /^\d{10}$/;


    if(name == "")
    {
        alert("Please Enter Your Name");

        return false;
    }

    else if(email == "" || !regEmail.test(email))
    {
        alert("Please Enter Valid Email");

        return false;
    }

    else if(password == "")
    {
        alert("Please Enter Password");

        return false;
    }

    else if(password.length < 6)
    {
        alert("Password should be atleast 6 characters");

        return false;
    }

    else if(phone == "" || !regPhone.test(phone))
    {
        alert("Please Enter Valid Phone Number");

        return false;
    }

    else if(what.selectedIndex == 0)
    {
        alert("Please Select Course");

        return false;
    }

    else
    {
        alert("Form Submitted Successfully");

        return true;
    }
}

</script>
