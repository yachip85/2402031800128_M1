<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Animation</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #813838;
        }

        .box {
            width: 150px;
            height: 150px;
            background-color: royalblue;
            border-radius: 10px;

            /* Text Center */
            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-size: 24px;
            font-weight: bold;

            /* Animation */
            animation: moveBox 3s infinite alternate;
        }

        @keyframes moveBox {
            0% {
                transform: translateX(0) rotate(0deg) scale(1);
                background-color: royalblue;
            }

            50% {
                transform: translateX(150px) rotate(180deg) scale(1.3);
                background-color: tomato;
            }

            100% {
                transform: translateX(0) rotate(360deg) scale(1);
                background-color: mediumseagreen;
            }
        }
    </style>
</head>

<body>

    <div class="box">HELLO</div>

</body>
</html>
